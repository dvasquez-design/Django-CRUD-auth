<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django CRUD - Tareas</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'tareas' %}">Django CRUD</a>
            <div class="ml-auto">
                {% if user.is_authenticated %}
                    <a class="btn btn-outline-light btn-sm mr-2" href="{% url 'tareas' %}">Mis tareas</a>
                    <a class="btn btn-outline-light btn-sm mr-2" href="{% url 'tareas_completed' %}">Completadas</a>
                    <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}?next={% url 'tareas' %}">Salir</a>
                {% else %}
                    <a class="btn btn-outline-light btn-sm mr-2" href="{% url 'login' %}">Ingresar</a>
                    <a class="btn btn-outline-light btn-sm" href="{% url 'sign_up' %}">Registrarse</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container mt-4">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}" role="alert">
                {{ message }}
            </div>
        {% endfor %}

        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
