{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-4 offset-md-4">
        <h1>Ingresar</h1>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Ingresar</button>
        </form>

        <p class="mt-3">
            ¿No tienes una cuenta? <a href="{% url 'sign_up' %}">Regístrate</a>.
        </p>
    </div>
</div>
{% endblock %}
