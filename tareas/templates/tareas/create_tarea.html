{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <h1>Crear nueva tarea</h1>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-success" type="submit">Guardar</button>
            <a class="btn btn-secondary" href="{% url 'tareas' %}">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
